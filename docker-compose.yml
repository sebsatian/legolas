services:
  visionplay:
    build:
      context: .
      dockerfile: Dockerfile
    image: visionplay:latest
    container_name: visionplay-demo
    ports:
      - "8080:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
